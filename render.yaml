services:
  - type: web
    name: mf-memes-finder-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # User will need to provide this in Render dashboard
      - key: JWT_SECRET
        sync: false # User will need to provide this in Render dashboard
